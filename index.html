<title>片單 Watchlist</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --border-hover: #3d3d3d;
    --text: #e8e4dc;
    --text-muted: #6b6660;
    --text-dim: #9a9490;
    --accent: #c8a96e;
    --accent-dim: #7a6540;
    --watched-bg: #0f1a12;
    --watched-border: #1e3322;
    --watched-text: #4a7a5a;
    --top-accent: #8b6fcb;
  }

  html { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-weight: 300; }

  body { min-height: 100vh; }

  .grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; position: relative; z-index: 1; }

  header { padding: 4rem 0 2.5rem; border-bottom: 1px solid var(--border); margin-bottom: 2.5rem; }

  .header-top { display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap; }

  .title-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(2.2rem, 5vw, 3.5rem);
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text);
    line-height: 1;
  }

  .title-en {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1rem, 2vw, 1.4rem);
    font-weight: 400;
    font-style: italic;
    color: var(--accent);
    letter-spacing: 0.02em;
  }

  .subtitle { margin-top: 0.75rem; font-size: 0.78rem; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; }

  .controls { margin-bottom: 2rem; display: flex; flex-direction: column; gap: 1rem; }

  .search-wrap { position: relative; max-width: 360px; }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 300;
    padding: 0.6rem 1rem 0.6rem 2.2rem;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.03em;
  }
  .search-wrap input::placeholder { color: var(--text-muted); }
  .search-wrap input:focus { border-color: var(--accent-dim); }
  .search-icon {
    position: absolute; left: 0.7rem; top: 50%; transform: translateY(-50%);
    width: 14px; height: 14px; opacity: 0.4;
    fill: none; stroke: var(--text); stroke-width: 2; stroke-linecap: round;
  }

  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  .pill {
    font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 4px 14px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted);
    cursor: pointer; border-radius: 1px;
    transition: all 0.15s; white-space: nowrap;
    font-family: 'Inter', sans-serif; font-weight: 400;
  }
  .pill:hover { border-color: var(--border-hover); color: var(--text-dim); }
  .pill.active { border-color: var(--accent); color: var(--accent); }

  .pill-watched { border-color: var(--watched-border); color: var(--watched-text); }
  .pill-watched:hover { border-color: var(--watched-text); }
  .pill-watched.active { border-color: var(--watched-text); color: var(--watched-text); background: var(--watched-bg); }

  .stats { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.08em; padding: 0 2px; margin-top: 0.5rem; }

  section { margin-bottom: 2.5rem; }

  .section-header {
    display: flex; align-items: center; gap: 0.8rem;
    margin-bottom: 1rem; padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border);
  }
  .section-name { font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); font-weight: 500; }
  .section-count { font-size: 0.65rem; color: var(--text-muted); opacity: 0.5; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .card {
    background: var(--surface);
    padding: 0.9rem 1rem;
    transition: background 0.15s;
    position: relative;
    overflow: hidden;
  }
  .card:hover { background: var(--surface2); }

  .card.is-watched { background: var(--watched-bg); }
  .card.is-watched:hover { background: #111c14; }
  .card.is-watched .card-zh { opacity: 0.6; }
  .card.is-watched .card-en { opacity: 0.5; }

  .card.is-top::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 2px; height: 100%;
    background: var(--top-accent);
    opacity: 0.7;
  }

  .card-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.88rem;
    font-weight: 400;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 0.3rem;
  }

  .card-en {
    font-size: 0.7rem;
    color: var(--text-muted);
    font-weight: 300;
    line-height: 1.3;
    font-style: italic;
    font-family: 'Playfair Display', serif;
  }

  .card-badge {
    display: inline-block;
    font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 2px 6px; margin-top: 0.45rem;
    font-family: 'Inter', sans-serif; font-weight: 500;
  }
  .badge-watched { border: 1px solid var(--watched-border); color: var(--watched-text); }
  .badge-top { border: 1px solid #3d2f6b; color: var(--top-accent); }

  .empty { padding: 3rem 0; text-align: center; color: var(--text-muted); font-size: 0.85rem; letter-spacing: 0.05em; }

  footer { border-top: 1px solid var(--border); padding: 2rem 0; margin-top: 3rem; text-align: center; font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.08em; }
</style>
</head>

const cats = Object.keys(data);
let activeCat = "all";
let showWatched = true;

function buildFilters() {
  const el = document.getElementById("filters");
  const all = document.createElement("button");
  all.className = "pill active"; all.textContent = "All";
  all.onclick = () => { activeCat = "all"; setActive(all); render(); };
  el.appendChild(all);

  cats.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "pill";
    btn.textContent = cat;
    btn.onclick = () => { activeCat = cat; setActive(btn); render(); };
    el.appendChild(btn);
  });

  const wbtn = document.createElement("button");
  wbtn.className = "pill pill-watched active"; wbtn.id = "wbtn";
  wbtn.textContent = "✓ Watched";
  wbtn.onclick = () => { showWatched = !showWatched; wbtn.classList.toggle("active", showWatched); render(); };
  el.appendChild(wbtn);
}

function setActive(el) {
  document.querySelectorAll(".pill:not(.pill-watched)").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
}

function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const main = document.getElementById("main");
  main.innerHTML = "";
  let total = 0;

  const toRender = activeCat === "all" ? cats : [activeCat];

  toRender.forEach(cat => {
    const def = data[cat];
    const items = def.items.filter(([zh, en, watched]) => {
      if (!showWatched && watched) return false;
      if (q && !zh.toLowerCase().includes(q) && !en.toLowerCase().includes(q)) return false;
      return true;
    });
    if (!items.length) return;
    total += items.length;

    const sec = document.createElement("section");
    sec.innerHTML = `<div class="section-header"><span class="section-name">${def.icon} ${cat}</span><span class="section-count">${items.length}</span></div>`;
    const grid = document.createElement("div"); grid.className = "grid";

    items.forEach(([zh, en, watched]) => {
      const card = document.createElement("div");
      card.className = "card" + (watched ? " is-watched" : "") + (def.isTop ? " is-top" : "");
      card.innerHTML = `<div class="card-zh">${zh}</div><div class="card-en">${en}</div>` +
        (watched ? `<span class="card-badge badge-watched">seen</span>` : "") +
        (def.isTop && !watched ? `<span class="card-badge badge-top">top pick</span>` : "");
      grid.appendChild(card);
    });

    sec.appendChild(grid);
    main.appendChild(sec);
  });

  document.getElementById("stats").textContent = `${total} titles`;
  if (!total) main.innerHTML = '<div class="empty">No titles found.</div>';
}

buildFilters();
render();
</script>
